<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>Canestrello Run — Sassello</title>
  <style>
    :root { color-scheme: light; }
    /* Previene zoom da doppio tap su iOS Safari su tutti gli elementi interattivi.
       touch-action:manipulation = pan + single-tap, NO double-tap-zoom.
       touch-action:none sul canvas = nessun gesto browser, solo input di gioco. */
    html, body { touch-action: manipulation; }
    body{
      margin:0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background:#f7f4ef; display:flex; justify-content:center; align-items:center; min-height:100vh;
    }
    .wrap{ width:min(1020px, 100%); padding:16px; }
    .card{
      background:#fff; border-radius:18px; box-shadow: 0 10px 30px rgba(0,0,0,.08);
      overflow:hidden;
    }
    header{
      display:flex; gap:12px; align-items:center; justify-content:space-between;
      padding:14px 16px; border-bottom:1px solid rgba(0,0,0,.06);
    }
    header .left{ display:flex; flex-direction:column; gap:2px;}
    header h1{ margin:0; font-size:16px; letter-spacing:.2px;}
    header p{ margin:0; font-size:12px; color:rgba(0,0,0,.65);}
    header .hint{ font-size:12px; color:rgba(0,0,0,.7); text-align:right;}
    canvas{ display:block; width:100%; height:auto; background:#eaf3ff;
            touch-action: none; /* canvas: nessun gesto browser, solo input gioco */ }
    .bar{
      display:flex; gap:10px; flex-wrap:wrap; align-items:center; justify-content:space-between;
      padding:12px 16px; border-top:1px solid rgba(0,0,0,.06);
    }
    .bar .btn{
      border:0; background:#111; color:#fff; padding:10px 12px; border-radius:12px;
      cursor:pointer; font-weight:700; font-size:13px;
    }
    .bar .btn.secondary{ background:#f0f0f0; color:#111; }
    .bar .small{ font-size:12px; color:rgba(0,0,0,.65); }
    .row{ display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
    .pill{
      background:#f3f3f3; border-radius:999px; padding:6px 10px; font-size:12px;
      color:rgba(0,0,0,.7);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <header>
        <div class="left">
          <h1>Canestrello Run — Borgo di Sassello</h1>
          <p>Prototipo web (Canvas) — endless runner family-friendly</p>
        </div>
        <div class="hint">
          <div><b>Salta:</b> Spazio / ↑ / Tap</div>
          <div><b>Doppio salto:</b> 2× (in aria)</div>
          <div><b>Pausa:</b> P</div>
        </div>
      </header>

      <canvas id="game" width="960" height="540" aria-label="Gioco Canestrello Run"></canvas>

      <div class="bar">
        <div class="row">
          <button class="btn" id="start">Avvia / Restart</button>
          <button class="btn secondary" id="mute">Audio: ON</button>
          <span class="pill" id="status">Pronto.</span>
        </div>
        <div class="row small">
          <span>Tip: su mobile gioca in verticale, tap per saltare.</span>
        </div>
      </div>
    </div>
  </div>

<script>
(() => {
  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");
  const startBtn = document.getElementById("start");
  const muteBtn  = document.getElementById("mute");
  const statusEl = document.getElementById("status");

  // ---------- localStorage ----------
  function getBest(){ try{ return Number(localStorage.getItem("canestrello_best_sassello")||0); }catch{ return 0; } }
  function saveBest(v){ try{ localStorage.setItem("canestrello_best_sassello",v); }catch{} }

  // ---------- Audio ----------
  let audioOn = true;
  const AudioCtx = window.AudioContext || window.webkitAudioContext;
  const actx = AudioCtx ? new AudioCtx() : null;
  function beep(freq=440,dur=0.06,type="square",gain=0.03){
    if(!audioOn||!actx) return;
    const o=actx.createOscillator(), g=actx.createGain();
    o.type=type; o.frequency.value=freq; g.gain.value=gain;
    o.connect(g); g.connect(actx.destination);
    o.start(); o.stop(actx.currentTime+dur);
  }
  let ambienceT=0;
  function ambience(dt){
    if(!audioOn||!actx) return;
    ambienceT+=dt;
    if(ambienceT>4.2){
      ambienceT=0;
      const base=620+Math.random()*120;
      beep(base,0.04,"sine",0.012);
      setTimeout(()=>beep(base+120,0.04,"sine",0.010),80);
    }
  }

  // ---------- Constants ----------
  const W=canvas.width, H=canvas.height;
  const groundY=420;
  const gravity=1700, jumpVel=-650, doubleJumpVel=-560;

  // ---------- State ----------
  // gameState: "idle" | "playing" | "gameover"
  let gameState = "idle";
  let paused = false, lastT = 0;
  let speed = 360;
  const speedMax=800, speedGrowth=0.85;
  let score=0, lives=3, best=getBest();
  let nextObsT=0, nextPickT=0;
  // Timestamp (performance.now) fino al quale ignorare input dopo game over.
  // Evita riavvio involontario causato dal tap/tasto che ha causato la sconfitta.
  let gameOverCooldownUntil = 0;
  const GAMEOVER_COOLDOWN_MS = 1300;
  // Accumulatore offset pavimentazione — separato da score per evitare
  // jitter su valori float elevati. Resettato a ogni partita.
  const TILE_REPEAT = 1200;
  let groundOffset = 0;
  // Offset della chiesa nel layer colline (scorre con v≈38, parallasse lento)
  let churchX = 710;

  // ---------- Scene objects ----------
  const clouds=[], hills=[], bushes=[], houses=[], signs=[], particles=[];
  let obstacles=[], pickups=[];

  // Frasi fisse per i primi due cartelli (tutorial, sempre visibili all'inizio)
  const signIntro = [
    "Premi SPAZIO per saltare",
    "Doppio salto: premi 2x!"
  ];
  // Frasi brandizzate — shuffled a ogni reset, con anti-ripetizione consecutiva
  const signBrand = [
    "Il Paese delle Dolcezze!",
    "Sassello: dove nasce la dolcezza",
    "Dal 1961, una storia di famiglia",
    "Specialità Liguri -->",
    "Tradizione Artigiana",
    "L'ABC della Dolcezza",
    "Amaretto Morbido: un classico",
    "Canestrellini: uno tira l'altro",
    "Nocciola Piemonte IGP"
  ];
  let _signDeck = [];    // mazzo shuffled corrente
  let _signDeckIdx = 0;  // posizione nel mazzo
  let _signLastText = ""; // ultima frase assegnata (anti-ripetizione)

  // Fisher-Yates shuffle in-place
  function shuffleArray(arr){
    for(let i=arr.length-1;i>0;i--){
      const j=Math.floor(Math.random()*(i+1));
      [arr[i],arr[j]]=[arr[j],arr[i]];
    }
  }
  // Inizializza/rimescola il mazzo garantendo che il primo elemento
  // non sia uguale all'ultimo testo già mostrato
  function rebuildDeck(){
    _signDeck = [...signBrand];
    shuffleArray(_signDeck);
    // se il primo elemento è uguale all'ultimo mostrato, ruota di uno
    if(_signDeck.length > 1 && _signDeck[0] === _signLastText){
      _signDeck.push(_signDeck.shift());
    }
    _signDeckIdx = 0;
  }
  function nextBrandText(){
    if(_signDeckIdx >= _signDeck.length) rebuildDeck();
    const t = _signDeck[_signDeckIdx++];
    _signLastText = t;
    return t;
  }

  // ---------- Player ----------
  const player={
    x:170, y:groundY-58, w:58, h:58,
    vy:0, onGround:true, canDouble:true,
    invincibleT:0, stickyT:0
  };

  // ---------- Utilities ----------
  function rand(min,max){ return min+Math.random()*(max-min); }
  function aabb(ax,ay,aw,ah,bx,by,bw,bh){
    return ax<bx+bw && ax+aw>bx && ay<by+bh && ay+ah>by;
  }
  function shadeColor(hex,amt){
    let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
    r=Math.max(0,Math.min(255,r+amt));
    g=Math.max(0,Math.min(255,g+amt));
    b=Math.max(0,Math.min(255,b+amt));
    return `rgb(${r},${g},${b})`;
  }

  // roundRect polyfill
  if(!CanvasRenderingContext2D.prototype.roundRect){
    CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
      r=Math.min(r,w/2,h/2);
      this.beginPath();
      this.moveTo(x+r,y); this.arcTo(x+w,y,x+w,y+h,r);
      this.arcTo(x+w,y+h,x,y+h,r); this.arcTo(x,y+h,x,y,r);
      this.arcTo(x,y,x+w,y,r); this.closePath();
      return this;
    };
  }

  // ---------- Particles ----------
  function addCrumble(x,y,count=14){
    for(let i=0;i<count;i++) particles.push({
      kind:"crumb",x,y,
      vx:rand(-240,240),vy:rand(-420,-80),
      life:rand(0.35,0.75),t:0,r:rand(2,4)
    });
  }
  function spawnPollen(){
    particles.push({
      kind:Math.random()<0.18?"leaf":"pollen",
      x:W+rand(0,40), y:rand(40,groundY-60),
      vx:rand(-30,-12), vy:rand(-6,8),
      life:rand(6,10), t:0, r:rand(1.2,2.2),
      a:rand(0.08,0.18), rot:rand(0,Math.PI*2), vrot:rand(-1.3,1.3)
    });
  }

  // Texture pietra precalcolata per le case (FIX sfarfallio)
  function makeHouseDots(w,h){
    const d=[];
    for(let i=0;i<18;i++) d.push({dx:rand(3,w-5), dy:rand(3,h-5), dw:rand(3,8), dh:rand(1,2)});
    return d;
  }

  // ---------- World reset ----------
  function resetWorld(){
    score=0; lives=3; speed=360; ambienceT=0; groundOffset=0; churchX=710;
    nextObsT=0.8; nextPickT=0.9;
    obstacles=[]; pickups=[]; particles.length=0;
    player.y=groundY-player.h; player.vy=0;
    player.onGround=true; player.canDouble=true;
    player.invincibleT=0; player.stickyT=0;
    clouds.length=0; hills.length=0; bushes.length=0;
    houses.length=0; signs.length=0;

    // Nuvole
    for(let i=0;i<6;i++) clouds.push({
      x:Math.random()*W, y:50+Math.random()*110,
      s:40+Math.random()*70, v:12+Math.random()*18
    });

    // Colline — bezier organiche ancorate a groundY
    for(let i=0;i<8;i++){
      const w=rand(300,480);
      hills.push({
        x: i*195+rand(0,60), w,
        peak: rand(90,200),
        bumpA: rand(-0.10,0.10),
        bumpB: rand(-0.07,0.07),
        shade: rand(0,0.14),   // 0=primo piano verde intenso, 1=distante chiaro
        v: rand(30,46)
      });
    }

    // Arbusti (layer intermedio tra colline e case)
    for(let i=0;i<12;i++) bushes.push({
      x: i*110+rand(0,50),
      w: rand(28,58), h: rand(16,30),
      v: 155,
      color: ["#4a8848","#538c4a","#3f7840","#5a9b52"][Math.floor(Math.random()*4)]
    });

    // Case — base ANCORATA a groundY
    for(let i=0;i<7;i++){
      const w=rand(58,88), h=rand(64,100);
      houses.push({
        x: i*250+120,
        y: groundY,        // piede muro = groundY
        w, h, v:115,
        dots: makeHouseDots(w,h),
        roofColor: ["#c96a54","#b05540","#8a4535","#c07848"][Math.floor(Math.random()*4)],
        floors: Math.random()<0.38 ? 2 : 1,
        shutterColor: Math.random()<0.6 ? "#3f6b4d" : "#607060"
      });
    }

    // Lavagnette — solo 3, spaziatura ampia, no accumuli
    // Reset e rimescola il mazzo testi cartelli
    _signLastText = "";
    rebuildDeck();
    // Primo cartello: sempre istruzione salto (subito visibile)
    signs.push({ x: 380,  y: groundY, v: 185, text: signIntro[0] });
    // Secondo cartello: doppio salto (a breve distanza dal primo)
    signs.push({ x: 950,  y: groundY, v: 185, text: signIntro[1] });
    // Terzo cartello: primo messaggio brandizzato (più avanti)
    signs.push({ x: 1680, y: groundY, v: 185, text: nextBrandText() });

    for(let i=0;i<30;i++) spawnPollen();
  }

  // ---------- Spawns ----------
  function spawnObstacle(){
    const r=Math.random();
    let type="cobble_spike";
    if(r>0.55) type="hot_tray";
    if(r>0.82) type="rolling_pin";
    let o={x:W+80,y:0,w:0,h:0,type,hit:false,t:0,hotT:0};
    if(type==="cobble_spike"){ o.w=44; o.h=26; o.y=groundY-o.h; }
    else if(type==="hot_tray"){ o.w=74; o.h=18; o.y=groundY-o.h; o.hotT=0; }
    else { o.w=84; o.h=22; o.baseY=groundY-68; o.y=o.baseY; o.amp=rand(26,46); o.freq=rand(2.2,3.2); }
    obstacles.push(o);
  }
  function spawnPickup(){
    const roll=Math.random();
    let type="sugar";
    if(roll>0.76) type="hazel";
    if(roll>0.93) type="glaze";
    pickups.push({x:W+60,y:groundY-120-rand(0,110),r:type==="hazel"?10:12,type,spin:rand(0,Math.PI*2)});
  }

  // ---------- startGame — avvia o riavvia la partita ----------
  function startGame(){
    if(actx && actx.state==="suspended") actx.resume().catch(()=>{});
    resetWorld();
    gameState="playing";
    paused=false;
    statusEl.textContent="Gioca!";
    beep(440,0.08,"square",0.03);
    lastT=performance.now();
    requestAnimationFrame(loop);
  }

  // ---------- jump — esegue il salto (solo durante playing) ----------
  function jump(){
    if(gameState!=="playing" || paused) return;
    const sf=player.stickyT>0?0.88:1;
    if(player.onGround){
      player.vy=jumpVel*sf; player.onGround=false; player.canDouble=true;
      addCrumble(player.x+player.w/2,player.y+player.h,6);
      beep(520,0.06,"square",0.03);
    } else if(player.canDouble){
      player.vy=doubleJumpVel*sf; player.canDouble=false;
      beep(660,0.06,"square",0.03);
    }
  }

  // ---------- handleInput — punto di ingresso unico per Space / tap ----------
  // Gestisce i tre stati in modo pulito, senza duplicazioni.
  function handleInput(){
    if(actx && actx.state==="suspended") actx.resume().catch(()=>{});
    if(gameState==="idle" || gameState==="gameover"){
      // Ignora input durante il cooldown post-gameover (evita riavvio involontario)
      if(gameState==="gameover" && performance.now() < gameOverCooldownUntil) return;
      startGame();
      jump();
    } else if(gameState==="playing"){
      jump();
    }
  }

  function togglePause(){
    if(gameState!=="playing") return;
    paused=!paused;
    statusEl.textContent=paused?"In pausa.":"Gioca!";
    beep(paused?220:330,0.06,"square",0.02);
  }

  // Tastiera: Space / ArrowUp → handleInput, P → pausa
  window.addEventListener("keydown",(e)=>{
    if(e.code==="Space"||e.code==="ArrowUp"){ e.preventDefault(); handleInput(); }
    if(e.key.toLowerCase()==="p") togglePause();
  },{passive:false});

  // Touch / click sul canvas → handleInput
  canvas.addEventListener("pointerdown",(e)=>{
    e.preventDefault();
    handleInput();
  },{passive:false});

  // Bottone HTML "Avvia / Restart" — rimane per accessibilità
  startBtn.addEventListener("click",()=> startGame());

  muteBtn.addEventListener("click",()=>{
    audioOn=!audioOn;
    muteBtn.textContent=`Audio: ${audioOn?"ON":"OFF"}`;
    statusEl.textContent=audioOn?"Audio attivo.":"Audio disattivato.";
    if(audioOn) beep(392,0.06,"square",0.02);
  });

  function endGame(){
    gameState="gameover";
    paused=false;
    // Cooldown: ignora input per 1.5s dopo il game over
    gameOverCooldownUntil = performance.now() + GAMEOVER_COOLDOWN_MS;
    best=Math.max(best,Math.floor(score));
    saveBest(best);
    statusEl.textContent=`Fine partita! Punti: ${Math.floor(score)} — Record: ${best}`;
    beep(196,0.10,"square",0.03);
    setTimeout(()=>beep(165,0.14,"square",0.03),90);
  }

  // ============================================================
  // RENDERING
  // ============================================================

  function drawSky(){
    const g=ctx.createLinearGradient(0,0,0,H);
    g.addColorStop(0,"#c6defc");
    g.addColorStop(0.48,"#daeeff");
    g.addColorStop(0.82,"#f4e6d6");
    g.addColorStop(1,"#eadacf");
    ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  }

  // Sole con alone caldo (FIX #4)
  function drawSun(){
    ctx.save();
    const glow=ctx.createRadialGradient(832,86,16,832,86,82);
    glow.addColorStop(0,"rgba(255,238,160,0.50)");
    glow.addColorStop(0.45,"rgba(255,230,140,0.18)");
    glow.addColorStop(1,"rgba(255,220,120,0)");
    ctx.fillStyle=glow;
    ctx.beginPath(); ctx.ellipse(832,86,82,82,0,0,Math.PI*2); ctx.fill();
    // disco
    ctx.globalAlpha=0.96; ctx.fillStyle="#ffe566";
    ctx.beginPath(); ctx.ellipse(832,86,36,36,0,0,Math.PI*2); ctx.fill();
    // bagliore interno
    ctx.globalAlpha=0.32; ctx.fillStyle="#fffce0";
    ctx.beginPath(); ctx.ellipse(824,78,13,9,0,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }

  function drawCloud(c){
    ctx.save();
    ctx.globalAlpha=0.80; ctx.fillStyle="#fff";
    ctx.beginPath();
    ctx.ellipse(c.x,c.y,c.s*0.55,c.s*0.30,0,0,Math.PI*2);
    ctx.ellipse(c.x+c.s*0.36,c.y+5,c.s*0.42,c.s*0.25,0,0,Math.PI*2);
    ctx.ellipse(c.x-c.s*0.30,c.y+9,c.s*0.38,c.s*0.22,0,0,Math.PI*2);
    ctx.fill();
    // ombra base
    ctx.globalAlpha=0.06; ctx.fillStyle="#8090a0";
    ctx.beginPath(); ctx.ellipse(c.x+5,c.y+c.s*0.20,c.s*0.52,c.s*0.13,0,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }

  // Colline organiche ancorate a groundY (FIX #2)
  function drawHill(h){
    ctx.save();
    const left=h.x-h.w*0.5, right=h.x+h.w*0.5;
    const top=groundY-h.peak;

    // gradient verticale per volume
    const hg=ctx.createLinearGradient(h.x,top,h.x,groundY);
    const hl=`hsl(${128-h.shade*22},${60-h.shade*20}%,${70+h.shade*16}%)`;
    const hd=`hsl(${120-h.shade*18},${50-h.shade*16}%,${55+h.shade*14}%)`;
    const hb=`hsl(${115-h.shade*14},${44-h.shade*12}%,${48+h.shade*10}%)`;
    hg.addColorStop(0,hl); hg.addColorStop(0.65,hd); hg.addColorStop(1,hb);
    ctx.fillStyle=hg;

    // Bezier organica — parte e arriva a groundY (ancorata)
    ctx.beginPath();
    ctx.moveTo(left, groundY);
    ctx.bezierCurveTo(
      left+h.w*0.20+h.bumpA*h.w, groundY-h.peak*0.52,
      h.x-h.w*0.10+h.bumpB*h.w,  top+h.peak*0.06,
      h.x, top
    );
    ctx.bezierCurveTo(
      h.x+h.w*0.08-h.bumpB*h.w*0.6,  top+h.peak*0.04,
      right-h.w*0.18-h.bumpA*h.w*0.4, groundY-h.peak*0.48,
      right, groundY
    );
    ctx.closePath();
    ctx.fill();

    // cresta luminosa
    ctx.globalAlpha=0.18; ctx.strokeStyle="#d8f0da"; ctx.lineWidth=2.5;
    ctx.beginPath();
    ctx.moveTo(h.x-h.w*0.18, top+20);
    ctx.bezierCurveTo(h.x-h.w*0.06,top+8, h.x+h.w*0.06,top+12, h.x+h.w*0.20,top+24);
    ctx.stroke();
    ctx.restore();
  }

  // Foschia orizzonte (FIX #5)
  function drawHorizon(){
    const hg=ctx.createLinearGradient(0,groundY-55,0,groundY+4);
    hg.addColorStop(0,"rgba(240,225,210,0)");
    hg.addColorStop(0.55,"rgba(232,218,200,0.26)");
    hg.addColorStop(1,"rgba(220,205,188,0)");
    ctx.fillStyle=hg;
    ctx.fillRect(0,groundY-55,W,60);
  }

  // Chiesa silhouette — scorre con il layer colline tramite churchX
  function drawChurchSilhouette(){
    ctx.save();
    const cx = churchX;          // centro orizzontale mobile
    const by = groundY - 8;      // base fissa al terreno

    // collinetta di sfondo
    ctx.globalAlpha=0.28; ctx.fillStyle="#556070";
    ctx.beginPath();
    ctx.ellipse(cx, groundY, 320, 115, 0, 0, Math.PI*2);
    ctx.fill();

    // corpo chiesa
    ctx.globalAlpha=0.30; ctx.fillStyle="#4a5560";
    ctx.fillRect(cx-40, by-54, 80, 54);
    // tetto a capanna
    ctx.beginPath();
    ctx.moveTo(cx-46, by-54); ctx.lineTo(cx, by-82); ctx.lineTo(cx+46, by-54);
    ctx.closePath(); ctx.fill();
    // campanile
    ctx.fillRect(cx+50, by-108, 26, 108);
    ctx.fillRect(cx+46, by-120, 34, 14);
    // punta campanile
    ctx.beginPath();
    ctx.moveTo(cx+63, by-140); ctx.lineTo(cx+46, by-120); ctx.lineTo(cx+80, by-120);
    ctx.closePath(); ctx.fill();
    // finestre
    ctx.globalAlpha=0.16; ctx.fillStyle="#cce0ff";
    ctx.fillRect(cx-12, by-46, 10, 18);
    ctx.fillRect(cx+2,  by-46, 10, 18);
    ctx.beginPath(); ctx.ellipse(cx+63, by-90, 5, 8, 0, 0, Math.PI*2); ctx.fill();

    ctx.restore();
  }

  // Arbusti layer intermedio (FIX #7)
  function drawBush(b){
    ctx.save();
    // ombra ellittica a terra
    ctx.globalAlpha=0.12; ctx.fillStyle="#000";
    ctx.beginPath(); ctx.ellipse(b.x+b.w*0.5,groundY,b.w*0.48,5,0,0,Math.PI*2); ctx.fill();
    // corpo (3 ellissi)
    ctx.globalAlpha=0.88; ctx.fillStyle=b.color;
    ctx.beginPath(); ctx.ellipse(b.x+b.w*0.32,groundY-b.h*0.52,b.w*0.36,b.h*0.56,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(b.x+b.w*0.64,groundY-b.h*0.42,b.w*0.30,b.h*0.46,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(b.x+b.w*0.50,groundY-b.h*0.70,b.w*0.32,b.h*0.44,0,0,Math.PI*2); ctx.fill();
    // highlight
    ctx.globalAlpha=0.13; ctx.fillStyle="#e0ffe4";
    ctx.beginPath(); ctx.ellipse(b.x+b.w*0.38,groundY-b.h*0.74,b.w*0.14,b.h*0.17,-0.3,0,Math.PI*2); ctx.fill();

  // Case 2D piatte — coerenti con il resto della scena
  function drawHouse(h){
    ctx.save();
    const bx=h.x-h.w/2, by=h.y; // by = groundY

    // ombra ellittica morbida a terra
    ctx.globalAlpha=0.14; ctx.fillStyle="#000";
    ctx.beginPath(); ctx.ellipse(h.x, by, h.w*0.50, 6, 0, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha=1;

    // parete frontale
    ctx.fillStyle="#efe5d6";
    ctx.fillRect(bx, by-h.h, h.w, h.h);

    // texture pietra (precalcolata)
    ctx.globalAlpha=0.11; ctx.fillStyle="#7a6040";
    for(const d of h.dots) ctx.fillRect(bx+d.dx, by-h.h+d.dy, d.dw, d.dh);
    ctx.globalAlpha=1;

    // zoccolo di contatto col suolo (scuro, ancora la casa al terreno)
    ctx.fillStyle="#b8a28a";
    ctx.fillRect(bx, by-8, h.w, 8);
    // linea scura netta al piede (contatto preciso)
    ctx.fillStyle="rgba(0,0,0,0.18)";
    ctx.fillRect(bx, by-1, h.w, 2);

    // tetto a capanna (solo faccia frontale, 2D coerente)
    const rh=h.h*0.52;
    ctx.fillStyle=h.roofColor;
    ctx.beginPath();
    ctx.moveTo(bx-5, by-h.h);
    ctx.lineTo(h.x,  by-h.h-rh);
    ctx.lineTo(bx+h.w+5, by-h.h);
    ctx.closePath(); ctx.fill();
    // ombra leggera nella metà destra del tetto (volume senza 3D)
    ctx.globalAlpha=0.14; ctx.fillStyle="#000";
    ctx.beginPath();
    ctx.moveTo(h.x, by-h.h-rh);
    ctx.lineTo(bx+h.w+5, by-h.h);
    ctx.lineTo(h.x, by-h.h);
    ctx.closePath(); ctx.fill();
    ctx.globalAlpha=1;
    // bordo del tetto
    ctx.strokeStyle="rgba(0,0,0,0.10)"; ctx.lineWidth=1.5;
    ctx.beginPath();
    ctx.moveTo(bx-5,by-h.h); ctx.lineTo(h.x,by-h.h-rh); ctx.lineTo(bx+h.w+5,by-h.h);
    ctx.stroke();

    // finestre per piano
    const flrs=h.floors||1;
    for(let fl=0;fl<flrs;fl++){
      const wy=by-h.h*0.76+fl*(h.h*0.36);
      const wx=bx+h.w*0.22, ww=h.w*0.56, wh=h.h*0.24;
      // vetro
      ctx.fillStyle="rgba(180,220,255,0.28)";
      ctx.fillRect(wx,wy,ww,wh);
      ctx.strokeStyle="rgba(0,0,0,0.18)"; ctx.lineWidth=1.5;
      ctx.strokeRect(wx,wy,ww,wh);
      // divisori
      ctx.strokeStyle="rgba(0,0,0,0.10)"; ctx.lineWidth=1;
      ctx.beginPath();
      ctx.moveTo(wx+ww/2,wy); ctx.lineTo(wx+ww/2,wy+wh);
      ctx.moveTo(wx,wy+wh/2); ctx.lineTo(wx+ww,wy+wh/2);
      ctx.stroke();
      // persiane
      ctx.fillStyle=h.shutterColor;
      ctx.fillRect(wx-ww*0.30,wy,ww*0.26,wh);
      ctx.fillRect(wx+ww*1.04,wy,ww*0.26,wh);
      // lamelle persiane
      ctx.globalAlpha=0.20; ctx.strokeStyle="#000"; ctx.lineWidth=1;
      for(let sl=1;sl<4;sl++){
        const sy=wy+wh*(sl/4);
        ctx.beginPath();
        ctx.moveTo(wx-ww*0.30,sy); ctx.lineTo(wx-ww*0.04,sy);
        ctx.moveTo(wx+ww*1.04,sy); ctx.lineTo(wx+ww*1.30,sy);
        ctx.stroke();
      }
      ctx.globalAlpha=1;
      // balcone piano terra con gerani
      if(fl===0){
        ctx.fillStyle="rgba(0,0,0,0.16)"; ctx.fillRect(wx-ww*0.08,wy+wh,ww*1.16,4);
        ctx.fillStyle="#d85b67"; ctx.fillRect(wx,wy+wh-7,ww,7);
      }
    }

    // porta centrata, taglia il bordo inferiore (ancorata al suolo)
    const dw=h.w*0.26, dh=h.h*0.34, dx=bx+h.w*0.37;
    ctx.fillStyle="#6b4828";
    ctx.beginPath(); ctx.roundRect(dx, by-dh, dw, dh, [6,6,0,0]); ctx.fill();
    // arco porta
    ctx.fillStyle="rgba(255,190,100,0.15)";
    ctx.beginPath(); ctx.ellipse(dx+dw*0.5, by-dh+1, dw*0.38, 5, 0, 0, Math.PI); ctx.fill();
    // maniglia
    ctx.fillStyle="#c8a060";
    ctx.beginPath(); ctx.ellipse(dx+dw*0.72, by-dh*0.36, 3, 3, 0, 0, Math.PI*2); ctx.fill();

    ctx.restore();
  }

  function drawCobblestoneGround(){
    ctx.fillStyle="#e0d3bf";
    ctx.fillRect(0,groundY,W,H-groundY);
    ctx.fillStyle="rgba(0,0,0,0.10)";
    ctx.fillRect(0,groundY,W,6);

    const tileH=30, rows=Math.ceil((H-groundY)/tileH);
    ctx.globalAlpha=0.48;
    for(let r=0;r<rows;r++){
      const y=groundY+r*tileH;
      let x=-(groundOffset % 62);  // 62 < TILE_REPEAT, wrap sempre uniforme
      while(x<W+62){
        const tw=40+((r%2)*10)+(Math.sin((x+r)*0.2)*5);
        const th=20+(Math.cos((x+r)*0.15)*3);
        ctx.fillStyle=(r%2===0)?"rgba(120,100,80,0.13)":"rgba(90,75,60,0.10)";
        ctx.beginPath(); ctx.roundRect(x,y+5,tw,th,7); ctx.fill();
        x+=tw+10;
      }
    }
    ctx.globalAlpha=1;
    ctx.globalAlpha=0.17; ctx.fillStyle="#3f6b4d";
    for(let i=0;i<16;i++){
      ctx.beginPath();
      ctx.ellipse((i*66 - groundOffset%66 + 66) % (W+66), groundY+40+(i%3)*8, 20, 8, 0, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.globalAlpha=1;
  }

  // Ombra player (FIX #8)
  function drawPlayerShadow(){
    const dist=groundY-(player.y+player.h);
    const sc=Math.max(0.18,1-dist/175);
    ctx.save();
    ctx.globalAlpha=0.17*sc; ctx.fillStyle="#000";
    ctx.beginPath();
    ctx.ellipse(player.x+player.w/2,groundY-2,player.w*0.44*sc,5.5*sc,0,0,Math.PI*2);
    ctx.fill();
    ctx.restore();
  }

  // Traccia la sagoma a fiore del canestrello con bordi morbidi.
  // Usa quadraticCurveTo: ogni vertice diventa punto di controllo,
  // il segmento va da punto-medio a punto-medio → arrotondamento naturale.
  // tension: 0 = spigoloso, 1 = massimamente arrotondato (0.42 = biscotto morbido)
  function canestrelloPath(R, ri, petals, tension = 0.42){
    const total = petals * 2;
    const step  = Math.PI / petals;

    // Pre-calcola tutti i vertici
    const pts = [];
    for(let i = 0; i < total; i++){
      const angle  = i * step - Math.PI / 2;
      const radius = (i % 2 === 0) ? R : ri;
      pts.push({ x: Math.cos(angle) * radius, y: Math.sin(angle) * radius });
    }

    ctx.beginPath();
    for(let i = 0; i < total; i++){
      const curr = pts[i];
      const next = pts[(i + 1) % total];
      // Punto medio tra vertice corrente e successivo
      const mx = curr.x + (next.x - curr.x) * tension;
      const my = curr.y + (next.y - curr.y) * tension;

      if(i === 0){
        // Parti dal punto medio tra l'ultimo e il primo vertice
        const prev = pts[total - 1];
        const sx = prev.x + (curr.x - prev.x) * tension;
        const sy = prev.y + (curr.y - prev.y) * tension;
        ctx.moveTo(sx, sy);
      }
      // Curva quadratica: il vertice è il punto di controllo, mx/my il traguardo
      ctx.quadraticCurveTo(curr.x, curr.y, mx, my);
    }
    ctx.closePath();
  }

  function drawPlayer(){
    drawPlayerShadow();
    ctx.save();
    ctx.translate(player.x + player.w/2, player.y + player.h/2);

    const nearG = (groundY - (player.y + player.h)) < 14;
    const squash = (!player.onGround && player.vy > 250 && nearG) ? 0.09 : 0;
    ctx.rotate(Math.sin(performance.now() * 0.01) * 0.04);
    ctx.scale(1 + squash, 1 - squash * 0.7);

    const PETALS = 8;
    const R  = 27;    // raggio punta petalo
    const ri = 19;    // raggio incavo tra petali
    const HOLE = 8.5; // raggio foro centrale

    // Aura invincibilità
    if(player.invincibleT > 0){
      ctx.globalAlpha = 0.22; ctx.fillStyle = "#ffffa0";
      ctx.beginPath(); ctx.ellipse(0, 0, R+14, R+14, 0, 0, Math.PI*2); ctx.fill();
      ctx.globalAlpha = 1;
    }

    // Alone di cottura (ombra sui bordi esterni)
    const shadowG = ctx.createRadialGradient(2, 3, 4, 0, 0, R);
    shadowG.addColorStop(0,   "rgba(0,0,0,0)");
    shadowG.addColorStop(0.68,"rgba(0,0,0,0)");
    shadowG.addColorStop(1,   "rgba(110,52,8,0.30)");
    canestrelloPath(R+2, ri+2, PETALS);
    ctx.fillStyle = shadowG; ctx.fill();

    // Corpo principale — gradiente radiale biscotto dorato
    const biscuitG = ctx.createRadialGradient(-4, -5, 2, 0, 0, R);
    biscuitG.addColorStop(0,    "#f9e2a4"); // centro chiaro (zucchero a velo)
    biscuitG.addColorStop(0.42, "#edbe5c"); // dorato medio
    biscuitG.addColorStop(0.76, "#d4872a"); // tostato ai bordi
    biscuitG.addColorStop(1,    "#b8661a"); // punta petalo ambrata
    canestrelloPath(R, ri, PETALS);
    ctx.fillStyle = biscuitG; ctx.fill();

    // Bordo smerlato scuro
    canestrelloPath(R, ri, PETALS);
    ctx.strokeStyle = "rgba(135,62,8,0.55)"; ctx.lineWidth = 1.8; ctx.stroke();

    // Venatura di cottura su ogni petalo
    for(let i = 0; i < PETALS; i++){
      const angle = (i / PETALS) * Math.PI * 2 - Math.PI / 2;
      const px = Math.cos(angle) * (ri + (R - ri) * 0.56);
      const py = Math.sin(angle) * (ri + (R - ri) * 0.56);
      ctx.globalAlpha = 0.14; ctx.fillStyle = "#7a3800";
      ctx.beginPath(); ctx.ellipse(px, py, 3.2, 5.2, angle, 0, Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha = 1;

    // Zucchero a velo — riflesso bianco in alto a sinistra
    const glazeG = ctx.createRadialGradient(-7, -9, 1, -3, -5, R * 0.76);
    glazeG.addColorStop(0,   "rgba(255,255,255,0.50)");
    glazeG.addColorStop(0.38,"rgba(255,255,255,0.16)");
    glazeG.addColorStop(1,   "rgba(255,255,255,0)");
    canestrelloPath(R, ri, PETALS);
    ctx.fillStyle = glazeG; ctx.fill();

    // Granelli di zucchero sparsi
    ctx.fillStyle = "rgba(255,255,255,0.72)";
    for(const [gx, gy] of [[-13, -9], [5, -15], [14, 3], [-5, 14]]){
      ctx.beginPath(); ctx.ellipse(gx, gy, 1.5, 1.1, 0.3, 0, Math.PI*2); ctx.fill();
    }

    // Foro centrale
    ctx.fillStyle = "rgba(58,26,4,0.85)";
    ctx.beginPath(); ctx.ellipse(0, 0, HOLE, HOLE * 0.88, 0, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = "rgba(80,38,6,0.55)"; ctx.lineWidth = 1.2;
    ctx.beginPath(); ctx.ellipse(0, 0, HOLE, HOLE * 0.88, 0, 0, Math.PI*2); ctx.stroke();
    // Riflesso nel foro
    ctx.globalAlpha = 0.20; ctx.fillStyle = "#fff";
    ctx.beginPath(); ctx.ellipse(-2.5, -2.5, 2.8, 1.8, -0.5, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;

    // Faccina (posizionata sotto il foro)
    ctx.fillStyle = "rgba(88,36,0,0.78)";
    ctx.beginPath(); ctx.ellipse(-7, 13, 2.0, 2.0, 0, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse( 7, 13, 2.0, 2.0, 0, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = "rgba(88,36,0,0.62)"; ctx.lineWidth = 1.8;
    ctx.beginPath(); ctx.arc(0, 15, 5, 0.18*Math.PI, 0.82*Math.PI); ctx.stroke();

    ctx.restore();
  }

  // ============================================================
  // LOOP
  // ============================================================
  function loop(t){
    if(gameState!=="playing") return;
    const dt=Math.min(0.033,(t-lastT)/1000);
    lastT=t;
    if(!paused){ update(dt); ambience(dt); }
    render();
    requestAnimationFrame(loop);
  }

  function update(dt){
    speed=Math.min(speedMax,speed+speedGrowth*60*dt);
    const ssf=player.stickyT>0?0.86:1;
    score+=dt*(speed/120);
    // Avanza l'offset pavé con la stessa scala della versione originale:
    // originale era score*0.8 con score+=dt*(speed/120) → Δ = dt*speed*(0.8/120)
    groundOffset = (groundOffset + speed * dt * (0.8 / 120)) % TILE_REPEAT;

    clouds.forEach(c=>{ c.x-=c.v*dt; if(c.x<-160) c.x=W+rand(40,220); });
    hills.forEach(h=>{ h.x-=h.v*dt; if(h.x<-h.w*0.6) h.x=W+rand(60,180); });
    // Chiesa: scorre a v=38 (identica al layer colline più lento), si riposiziona sul lato destro
    churchX -= 38 * dt;
    if(churchX < -400) churchX = W + 200;
    bushes.forEach(b=>{ b.x-=b.v*dt; if(b.x<-b.w-20) b.x=W+rand(50,150); });
    houses.forEach(h=>{ h.x-=h.v*dt; if(h.x<-220) h.x=W+rand(240,440); });
    signs.forEach(s=>{
      s.x-=s.v*dt;
      if(s.x<-320){
        // Spazio minimo tra cartelli: almeno 700px dopo il più lontano cartello esistente
        const furthest = signs.reduce((mx,si)=> si.x>mx ? si.x : mx, W);
        s.x = Math.max(W + 700, furthest + rand(680, 900));
        s.text = nextBrandText();
      }
    });

    if(Math.random()<0.35) spawnPollen();

    nextObsT-=dt; nextPickT-=dt;
    if(nextObsT<=0){
      spawnObstacle();
      nextObsT=Math.max(0.55,rand(0.80,1.35)*(560/Math.max(360,speed)));
    }
    if(nextPickT<=0){ spawnPickup(); nextPickT=rand(0.70,1.40); }

    player.vy+=gravity*dt;
    player.y+=player.vy*dt;
    if(player.y>=groundY-player.h){
      const landed=!player.onGround;
      player.y=groundY-player.h; player.vy=0;
      player.onGround=true; player.canDouble=true;
      if(landed){ addCrumble(player.x+player.w/2,groundY,10); beep(240,0.03,"square",0.012); }
    } else { player.onGround=false; }

    if(player.invincibleT>0) player.invincibleT=Math.max(0,player.invincibleT-dt);
    if(player.stickyT>0) player.stickyT=Math.max(0,player.stickyT-dt);

    obstacles.forEach(o=>{
      o.t+=dt; o.x-=speed*dt*ssf;
      if(o.type==="rolling_pin") o.y=(o.baseY??groundY-68)+Math.sin(o.t*o.freq)*o.amp;
    });
    pickups.forEach(p=>p.x-=speed*dt*ssf);
    obstacles=obstacles.filter(o=>o.x>-160);
    pickups=pickups.filter(p=>p.x>-100);

    for(const o of obstacles){
      if(o.hit) continue;
      const pad=(o.type==="rolling_pin")?6:0;
      const hit=aabb(player.x,player.y,player.w,player.h,o.x-pad,o.y-pad,o.w+pad*2,o.h+pad*2);
      if(hit){
        if(o.type==="hot_tray"){
          const feetY=player.y+player.h;
          if(feetY<=o.y+10&&player.vy>=0){
            o.hotT+=dt;
            if(o.hotT>0.65&&player.invincibleT<=0){
              o.hit=true; lives--;
              addCrumble(player.x+player.w/2,player.y+player.h/2,22);
              beep(120,0.08,"square",0.03);
              player.invincibleT=1.1; o.hotT=0;
              if(lives<=0){endGame();return;}
            }
          } else {
            if(player.invincibleT<=0){
              o.hit=true; lives--;
              addCrumble(player.x+player.w/2,player.y+player.h/2,18);
              beep(120,0.08,"square",0.03);
              player.invincibleT=1.1;
              if(lives<=0){endGame();return;}
            } else {
              o.hit=true;
              addCrumble(player.x+player.w/2,player.y+player.h/2,10);
              beep(880,0.05,"square",0.02);
            }
          }
        } else {
          o.hit=true;
          if(player.invincibleT>0){
            addCrumble(player.x+player.w/2,player.y+player.h/2,10);
            beep(880,0.05,"square",0.02);
          } else {
            lives--;
            addCrumble(player.x+player.w/2,player.y+player.h/2,22);
            beep(120,0.08,"square",0.03);
            player.invincibleT=1.1;
            if(lives<=0){endGame();return;}
          }
        }
      }
    }

    for(let i=pickups.length-1;i>=0;i--){
      const p=pickups[i];
      if(aabb(player.x,player.y,player.w,player.h,p.x-p.r,p.y-p.r,p.r*2,p.r*2)){
        pickups.splice(i,1);
        if(p.type==="sugar"){ score+=55; beep(740,0.06,"square",0.02); }
        else if(p.type==="hazel"){ score+=85; beep(820,0.06,"square",0.02); }
        else {
          player.invincibleT=Math.max(player.invincibleT,3.0); score+=30;
          beep(520,0.05,"square",0.02); setTimeout(()=>beep(660,0.05,"square",0.02),60);
        }
      }
    }

    for(let i=particles.length-1;i>=0;i--){
      const p=particles[i]; p.t+=dt;
      if(p.kind==="crumb"){
        p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=1200*dt;
        if(p.t>=p.life) particles.splice(i,1);
        continue;
      }
      p.x+=p.vx*dt; p.y+=p.vy*dt+Math.sin((p.x+p.y)*0.01)*0.2;
      p.rot+=p.vrot*dt;
      if(p.y<20) p.y=20; if(p.y>groundY-40) p.y=groundY-40;
      if(p.t>=p.life||p.x<-80) particles.splice(i,1);
    }

    if(player.onGround&&Math.random()<0.004) player.stickyT=0.6;
  }

  function render(){
    drawSky();
    drawSun();
    clouds.forEach(drawCloud);
    hills.forEach(drawHill);
    drawChurchSilhouette();
    drawHorizon();          // foschia sopra colline
    bushes.forEach(drawBush);
    houses.forEach(drawHouse);

    // particelle (polline/foglie)
    ctx.save();
    for(const p of particles){
      if(p.kind==="pollen"){
        ctx.globalAlpha=p.a; ctx.fillStyle="#fff";
        ctx.beginPath(); ctx.ellipse(p.x,p.y,p.r*1.1,p.r,0,0,Math.PI*2); ctx.fill();
      } else if(p.kind==="leaf"){
        ctx.globalAlpha=p.a*0.9; ctx.fillStyle="rgba(63,107,77,0.9)";
        ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot);
        ctx.beginPath(); ctx.ellipse(0,0,p.r*2.2,p.r*1.2,0,0,Math.PI*2); ctx.fill();
        ctx.restore();
      }
    }
    ctx.restore();

    drawCobblestoneGround();
    signs.forEach(drawSigns);
    pickups.forEach(drawPickup);
    obstacles.forEach(drawObstacle);
    drawPlayer();

    // crumble sopra tutto
    ctx.save();
    ctx.fillStyle="rgba(255,255,255,0.75)";
    for(const p of particles){
      if(p.kind!=="crumb") continue;
      const a=1-(p.t/p.life);
      ctx.globalAlpha=a*0.85;
      ctx.beginPath(); ctx.ellipse(p.x,p.y,p.r,p.r,0,0,Math.PI*2); ctx.fill();
    }
    ctx.restore();

    if(player.stickyT>0){
      ctx.save(); ctx.globalAlpha=0.22; ctx.fillStyle="#fff";
      ctx.beginPath(); ctx.roundRect(player.x-8,groundY-10,90,12,10); ctx.fill();
      ctx.restore();
    }

    drawHUD();

    ctx.save(); ctx.globalAlpha=0.42; ctx.fillStyle="#000";
    ctx.font="12px system-ui"; ctx.textAlign="left";
    ctx.fillText("© La Sassellese — Canestrello Run (prototipo Sassello)",16,H-16);
    ctx.restore();
  }

  // ---------- Idle render ----------
  resetWorld();
  gameState="idle";
  render();
  statusEl.textContent="Premi SPAZIO o tocca per iniziare.";
})();
</script>
</body>
